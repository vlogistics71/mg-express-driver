<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>MG Express Driver Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --green-dark: #064f3b;
      --green: #087455;
      --coral: #ff665c;
      --ink: #17221e;
      --muted: #68756f;
      --line: #dfe8e4;
      --background: #f3f8f6;
      --white: #ffffff;
      --danger: #9b2929;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--background);
      color: var(--ink);
    }

    .login-card {
      width: 100%;
      max-width: 520px;
      padding: 34px 28px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 25px;
      box-shadow: 0 14px 38px rgba(0, 0, 0, .08);
    }

    .brand {
      color: var(--green-dark);
      font-size: 29px;
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 17px;
    }

    .brand span {
      color: var(--coral);
    }

    .subtitle {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.4;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 26px;
      font-size: 43px;
      line-height: 1;
    }

    label {
      display: block;
      margin: 17px 0 7px;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 58px;
      padding: 14px 15px;
      border: 1px solid #ccd8d3;
      border-radius: 14px;
      background: white;
      color: var(--ink);
      font-size: 17px;
      outline: none;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(8, 116, 85, .12);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 85px;
    }

    .show-password {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      border: 0;
      border-radius: 10px;
      padding: 9px 10px;
      background: #edf5f2;
      color: var(--green-dark);
      font-weight: 800;
    }

    .sign-in {
      width: 100%;
      min-height: 58px;
      margin-top: 25px;
      border: 0;
      border-radius: 14px;
      background: var(--green);
      color: white;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
    }

    .sign-in:disabled {
      opacity: .65;
      cursor: default;
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.4;
    }

    .message.info {
      display: block;
      background: #edf7f3;
      color: #06543e;
    }

    .message.error {
      display: block;
      background: #fff0f0;
      color: var(--danger);
    }

    .help {
      margin-top: 24px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .driver-only {
      margin-top: 20px;
      padding: 13px;
      border-radius: 12px;
      background: #f6faf8;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 500px) {
      body {
        align-items: flex-start;
        padding: 20px 15px;
      }

      .login-card {
        margin-top: 40px;
        padding: 30px 23px;
      }

      h1 {
        font-size: 39px;
      }
    }
  </style>
</head>

<body>
  <main class="login-card">
    <div class="brand">
      MG <span>EXPRESS</span> DRIVER
    </div>

    <div class="subtitle">
      Secure access to assigned jobs, delivery photos and earnings.
    </div>

    <h1>Driver Sign In</h1>

    <form id="loginForm">
      <label for="email">Email</label>

      <input
        id="email"
        type="email"
        autocomplete="email"
        required
      >

      <label for="password">Password</label>

      <div class="password-wrap">
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          required
        >

        <button
          class="show-password"
          id="showPasswordButton"
          type="button"
        >
          Show
        </button>
      </div>

      <button
        class="sign-in"
        id="signInButton"
        type="submit"
      >
        Sign In
      </button>
    </form>

    <div id="message" class="message"></div>

    <div class="help">
      Need help signing in?<br>
      Contact MG Express Dispatch.
    </div>

    <div class="driver-only">
      This portal is for MG Express drivers only.
    </div>
  </main>

  <script>
    const client = supabase.createClient(
      "https://dczlucwfjayymlwbzzdi.supabase.co",
      "sb_publishable_kcv_a78ZyUxMo2neKUANdw_XN7eAMpI"
    );

    const loginForm =
      document.getElementById("loginForm");

    const signInButton =
      document.getElementById("signInButton");

    const message =
      document.getElementById("message");

    const passwordInput =
      document.getElementById("password");

    const showPasswordButton =
      document.getElementById("showPasswordButton");

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "message " + type;
    }

    function resetButton() {
      signInButton.disabled = false;
      signInButton.textContent = "Sign In";
    }

    async function verifyDriver(userId) {
      const profileResult = await client
        .from("profiles")
        .select("role")
        .eq("id", userId)
        .maybeSingle();

      if (
        profileResult.error ||
        !profileResult.data
      ) {
        await client.auth.signOut();

        showMessage(
          profileResult.error?.message ||
          "No MG Express profile was found for this account.",
          "error"
        );

        resetButton();
        return;
      }

      const role = String(
        profileResult.data.role || ""
      ).toLowerCase();

      if (role !== "driver") {
        await client.auth.signOut();

        showMessage(
          "This account does not have driver access. Use the correct MG Express portal.",
          "error"
        );

        resetButton();
        return;
      }

      location.replace("/driver.html");
    }

    loginForm.addEventListener(
      "submit",
      async function (event) {
        event.preventDefault();

        signInButton.disabled = true;
        signInButton.textContent = "Signing In…";

        showMessage(
          "Checking your driver account…",
          "info"
        );

        const email =
          document
            .getElementById("email")
            .value
            .trim();

        const password =
          passwordInput.value;

        const result =
          await client.auth.signInWithPassword({
            email: email,
            password: password
          });

        if (result.error) {
          showMessage(
            result.error.message,
            "error"
          );

          resetButton();
          return;
        }

        await verifyDriver(
          result.data.user.id
        );
      }
    );

    showPasswordButton.addEventListener(
      "click",
      function () {
        const showing =
          passwordInput.type === "text";

        passwordInput.type =
          showing ? "password" : "text";

        showPasswordButton.textContent =
          showing ? "Show" : "Hide";
      }
    );

    async function checkExistingSession() {
      const result =
        await client.auth.getSession();

      const session =
        result.data.session;

      if (session) {
        showMessage(
          "Opening your driver dashboard…",
          "info"
        );

        await verifyDriver(
          session.user.id
        );
      }
    }

    checkExistingSession();
  </script>
</body>
</html>
